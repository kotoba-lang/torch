name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: clojure -M:test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: torch
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - name: Checkout torch
        uses: actions/checkout@v4
        with:
          path: torch

      - name: Checkout num local dependency
        uses: actions/checkout@v4
        with:
          repository: kotoba-lang/num
          path: num

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache m2 / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-jdk${{ matrix.java }}-clj-${{ hashFiles('torch/deps.edn', 'num/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-clj-

      - name: Run tests
        run: clojure -M:test

      - name: Lint
        run: clojure -M:lint
